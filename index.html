<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Törü — Türk'ün Töresi</title>

<style>

body{
background:#0a0f1f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:10px;
}

#board{
width:480px;
height:480px;
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
border:4px solid #333;
}

.square{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
cursor:pointer;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

button{
padding:10px 20px;
margin:6px;
border-radius:10px;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>
</head>


<body>

<h1>Törü — Türk'ün Töresi</h1>

<button onclick="newGame()">Yeni Oyun</button>
<button onclick="flipBoard()">Tahtayı Çevir</button>

<div id="board"></div>

<script>

const pieces={
p:"♟",
r:"♜",
n:"♞",
b:"♝",
q:"♛",
k:"♚",
P:"♙",
R:"♖",
N:"♘",
B:"♗",
Q:"♕",
K:"♔"
}

let board=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
]

let turn="white"
let selected=null
let flipped=false

function draw(){

const b=document.getElementById("board")
b.innerHTML=""

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let index=flipped?(7-r)*8+(7-c):r*8+c

let sq=document.createElement("div")

sq.className="square "+((r+c)%2==0?"light":"dark")

sq.dataset.index=index

sq.onclick=clickSquare

sq.textContent=pieces[board[index]]||""

b.appendChild(sq)

}

}

}

function clickSquare(e){

let i=parseInt(e.target.dataset.index)

if(selected==null){

if(board[i]!=""){
selected=i
}

}else{

move(selected,i)
selected=null

}

draw()

}

function move(a,b){

board[b]=board[a]
board[a]=""

}

function flipBoard(){

flipped=!flipped
draw()

}

function newGame(){

board=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
]

draw()

}

draw()

</script>

</body>
</html>
